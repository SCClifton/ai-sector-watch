name: deploy-azure

# Phase 3 cutover: this workflow now builds the Next.js container under web/
# and deploys it to the same Azure App Service. The Streamlit code under
# dashboard/ stays in the repo for one cooling-off release but does not
# trigger a deploy any more.
#
# Rollback: re-deploy the tag `:streamlit-final`, which we publish as a
# one-time backup before the first Next.js push.

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/deploy.yml"
      - "Dockerfile"

permissions:
  id-token: write   # required for OIDC federated credential
  contents: read
  packages: write   # required to push the container image to GHCR

env:
  AZURE_RESOURCE_GROUP: ai-sector-watch
  AZURE_WEBAPP_NAME: ai-sector-watch
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  IMAGE_NAME: ai-sector-watch
  REGISTRY: ghcr.io

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Validate infrastructure economics
        working-directory: web
        run: |
          npm ci
          npm run validate:infra

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image path
        id: image
        run: echo "path=${REGISTRY}/${GITHUB_REPOSITORY,,}/${IMAGE_NAME}" >> "$GITHUB_OUTPUT"

      - name: Build and push container
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.path }}:latest
            ${{ steps.image.outputs.path }}:${{ github.sha }}

      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy to Azure Web App for Containers
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          images: ${{ steps.image.outputs.path }}:${{ github.sha }}
