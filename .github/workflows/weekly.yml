name: weekly-pipeline

on:
  schedule:
    # Sunday 18:00 UTC = Monday 04:00 / 05:00 in Sydney depending on DST.
    - cron: "0 18 * * 0"
  workflow_dispatch:
    inputs:
      limit:
        description: "Items per source"
        required: false
        default: "25"

permissions:
  contents: write  # so we can commit the digest markdown back

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      ANTHROPIC_BUDGET_USD_PER_RUN: "2"
      ANTHROPIC_MODEL: "claude-sonnet-4-6"
      PIPELINE_LOG_LEVEL: INFO
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify setup
        run: python scripts/verify_setup.py --apply-schema

      - name: Run weekly pipeline
        run: |
          LIMIT="${{ github.event.inputs.limit || '25' }}"
          python scripts/run_weekly_pipeline.py --limit "$LIMIT" | tee pipeline_summary.json

      - name: Commit digest
        run: |
          if [ -n "$(git status --porcelain data/digests/)" ]; then
            git config user.name "ai-sector-watch-bot"
            git config user.email "ai-sector-watch-bot@users.noreply.github.com"
            git add data/digests/
            git commit -m "chore(digest): weekly run $(date -u +%Y-%m-%d)"
            git push
          else
            echo "No digest changes to commit."
          fi

      - name: Upload pipeline summary
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pipeline-summary
          path: pipeline_summary.json
          retention-days: 30
