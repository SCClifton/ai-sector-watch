[theme]
# Foundation visual layer for AI Sector Watch.
# See docs/design-system.md for the decision log behind these choices.
base = "dark"
primaryColor = "#F4B740"
backgroundColor = "#0B0F14"
secondaryBackgroundColor = "#121821"
textColor = "#E6EDF3"
font = "Inter:https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
codeFont = "JetBrains Mono:https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap"

[browser]
gatherUsageStats = false

[client]
toolbarMode = "minimal"
showSidebarNavigation = false

[server]
# Serve dashboard/static/ at /app/static/ so og-image and favicon resolve
# from meta tags and external embeds.
enableStaticServing = true
