#   name: required, exact display name
#   country: AU or NZ
#   city: must exist in src/ai_sector_watch/discovery/geocoder.py ANZ_CITIES
#   website: https URL preferred
#   sector_tags: list of tags from src/ai_sector_watch/discovery/taxonomy.py
#                first tag = primary (drives marker colour on map)
#   stage: pre_seed | seed | series_a | series_b_plus | mature
#   founded_year: optional integer
#   description_seed: 1-3 sentence summary, no em dashes
#
# All entries below load with discovery_status = "verified".
# To add a company: append a YAML block, run `python scripts/seed_companies.py`.

